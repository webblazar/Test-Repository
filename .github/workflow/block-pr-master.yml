name: Block external PRs to master
on:
  pull_request:
    branches: [ "main" ]
    types: [opened, reopened]

jobs:
  close-pr:
    if: contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) == false
    runs-on: ubuntu-latest
    steps:
      - name: Close the PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '**Alert:** Only team members can open a Pull Request to `master`. If you wish to contribute, please target the `dev` branch.'
            })
            github.rest.pulls.update({
              pull_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            })
